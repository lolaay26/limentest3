const ART = {};
const ART_LOAD_PROMISE = (async () => {
  const batch1 = AIC_WORKS.slice(0, 50).map(w => w.id).join(',');
  const batch2 = AIC_WORKS.slice(50).map(w => w.id).join(',');
  const imageMap = {};
  for (const ids of [batch1, batch2]) {
    if (!ids) continue;
    try {
      console.log('Fetching AIC batch...');
      const res = await fetch(`https://api.artic.edu/api/v1/artworks?ids=${ids}&fields=id,image_id&limit=50`);
      console.log('AIC response status:', res.status);
      const data = await res.json();
      console.log('AIC batch returned', data.data?.length, 'items');
      (data.data || []).forEach(item => { if (item.image_id) imageMap[item.id] = item.image_id; });
    } catch(e) { console.log('AIC batch fetch error:', e.message); }
  }
  AIC_WORKS.forEach(w => {
    const imgId = imageMap[w.id];
    if (imgId) {
      const rawUrl = `https://www.artic.edu/iiif/2/${imgId}/full/600,/0/default.jpg`;
      ART[w.key] = { url: `${PROXY}${encodeURIComponent(rawUrl)}`, title: w.title, artist: w.artist, tradition: w.tradition };
    }
  });
  console.log(`ART library loaded: ${Object.keys(ART).length} of ${AIC_WORKS.length} works`);
})();

  "Walked past my childhood home today. The new family had painted it a different color. I stood there longer than made sense.",
  "It's been grey for days. Not stormy, just grey. I noticed I've been waiting for it to change before I do certain things.",

];

const LOADING_TEXTS = ['Going deeper into what you\'ve shared','Listening across traditions','Finding what rhymes with your life','Gathering thought from many worlds','Following the thought wherever it leads'];

document.getElementById('date-line').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

EXAMPLES.forEach(ex=>{

// ─── API KEY ───────────────────────────────────────────────────────
// API key stored in session only — never in the file
let apiKey = sessionStorage.getItem('limen_key') || '';
if (!apiKey) {
  apiKey = prompt('Enter your Limen access code:') || '';
  if (apiKey) sessionStorage.setItem('limen_key', apiKey);
}
// ──────────────────────────────────────────────────────────────────
let loadingInterval;



function buildPrompt(entry){
  return `You are the philosophical heart of Limen, a journaling app. Your role is not to analyze or interpret. It is to meet.

Journal entry: "${entry}"

YOUR CORE TASK:
Read this entry for the full quality of experience it carries — not just its surface statement but the layers operating simultaneously: sensory, temporal, affective, relational. The entry may not know what it is yet. Find where in the full breadth of human thought — any tradition, any culture, any century — those same layers have been named, lived, or understood. The match is a recognition: the reader arrives at a thinker or concept and feels that something already present in their experience has now been seen. The tradition does not interpret the entry. It meets it.

This means: do not reach for the statistically common match. Do not default to familiar names. Ask what this entry is actually carrying — the quality, the texture, the specific kind of noticing — and find the tradition that has lived most deeply inside exactly that.

TONE: Warm, direct, learned. Like a knowledgeable friend who takes both the person and the ideas seriously. Not therapeutic, not academic. Short sentences carry more weight. The ideas can be sophisticated — the language should feel spoken, not written. If a sentence sounds like it belongs in a journal article, rewrite it. A curious 17-year-old should be able to follow it without losing the depth. NEVER use: "invites us to", "reminds us", "journey", "growth", "healing", "transform", "explore", "navigate", "sit with", "hold space", "unpack", "constitutional", "presents as".

OPENING LINE — vary the formula every time:
- "There is a word for this — [CONCEPT]..."
- "[Thinker] called this..."
- "This is exactly what [thinker] was thinking about when..."
- Name what is happening in the entry directly, then the thinker
- NEVER: "What you wrote resonates with..."

FULL RANGE OF THINKERS — draw from wherever the entry genuinely leads:
Spinoza, Bergson, Heidegger, Nietzsche, Merleau-Ponty, Bachelard, de Beauvoir, Wittgenstein, Benjamin, Bakhtin, Deleuze/Guattari, James, Thoreau, Husserl, Sartre, Arendt — AND — Massumi, Berlant, Kathleen Stewart, Ahmed, Butler, Braidotti, Grosz, Barad — AND — Abram, Toadvine, Haraway, Tsing, Viveiros de Castro, Morton — AND — Lorde, Wynter, hooks, Moten, Mbembe, Glissant, Fanon, Gilroy — AND — Nishida, Watsuji, Yuasa, Zhuangzi, Nagarjuna, Dōgen, Ibn Rushd, Confucius — AND — Kimmerer, Atleo, Deloria, Ungunmerr-Baumann, Coulthard, Simpson, TallBear, Ubuntu, Buen Vivir — AND — Thich Nhat Hanh, Machig Labdrön, Mirabai.

The entry decides who leads. Not habit. Not frequency. Genuine fit.

CONCEPTS — enter through these when they are the most precise name for what the entry carries:
haecceity (the absolute thisness of this moment), conatus (the body's drive to persist and flourish), heteroglossia (language always populated by others' voices), duration (lived time vs clock time), affect (intensity before it becomes named emotion), opacity (the right to not be fully transparent or known), fūdo (climate and place as constitutive of self), interbeing (nothing exists independently), sympoiesis (making-together — nothing makes itself alone), dadirri (deep listening as a way of knowing), cruel optimism (attachment to what actually holds us back), grievability (whose losses count as losses), poiesis (making as a form of knowing), the fold (inside and outside as continuous), becoming (process over fixed identity), flesh — chair (the reversibility of sensing and being sensed), mono no aware (the bittersweet awareness of impermanence), ubuntu (I am because we are — relational ontology).

SECOND THINKER — different tradition, not opposition. The relationship is one of:
- convergence: two traditions arriving at the same territory from different starting points
- deepening: one takes the other somewhere it couldn't reach alone
- expansion: adds a dimension the first tradition entirely missed
- feminist resonance: names what the first thinker saw but couldn't say

EXPANSION — a thought that opens the idea further. Philosophically precise but written in plain, spoken language — as if said aloud to a curious 20-year-old who thinks seriously. No academic vocabulary unless unavoidable. Short sentences. The insight should land in the body, not the head. Not addressed to the reader. Not therapeutic. Examples of the right register: "Both get close — but neither quite names this: how the disconnection can feel so total, so familiar, that it stops feeling like something that happened to you and starts feeling like just who you are." Or: "The strange thing is that the body knows before the mind does. It always has."

ARTWORKS — choose two from this curated library. Pick genuinely different traditions. Match the quality of experience in the entry, not just the subject matter. Contemporary, non-Western, and ancient works are all here — use the full range.

${ART_KEYS}

JSON only, no markdown:
{
  "resonance": "Opening — under 35 words. Varied formula. Names what the entry is carrying, not what it means.",
  "concept_name": "Concept term if concept-led e.g. HAECCEITY. Else empty string.",
  "concept_gloss": "One plain sentence if concept used. Else empty string.",
  "primary_tradition": "Thinker · Tradition",
  "primary_who": "2 sentences: who they are and what specific territory they share with this entry. Plain, not academic.",
  "primary_quote": "Real quote, under 35 words",
  "relationship_type": "convergence/deepening/expansion/feminist resonance",
  "mirror_tradition": "Thinker · Tradition",
  "mirror_who": "2 sentences: who they are and what they add.",
  "mirror_quote": "Real quote, under 30 words",
  "mirror_relationship": "One sentence: what becomes visible when both are held together.",
  "expansion": "One thought that opens the idea further. Spoken language, not academic. Short sentences. Not addressed to reader.",
  "artwork1_key": "key from library above",
  "artwork1_why": "One sentence — what quality of experience this work shares with the entry",
  "artwork2_key": "Different key, genuinely different tradition from artwork1",
  "artwork2_why": "One sentence — what quality of experience this work shares with the entry",
  "poem_text": "3-5 lines — real poem from any tradition, chosen for genuine resonance",
  "poem_attribution": "Poet · tradition",
  "poem_source": "Title and date"
}`;
}

async function reflect(){
  const text=document.getElementById('journal-input').value.trim();
  if(text.length<20){showError('Write a little more before reflecting.');return;}
  hideError();
  document.getElementById('input-section').style.display='none';
  document.getElementById('response').style.display='none';
  document.getElementById('loading').style.display='block';
  let tick=0;
  loadingInterval=setInterval(()=>{tick++;document.getElementById('loading-text').textContent=LOADING_TEXTS[tick%LOADING_TEXTS.length]+'…';},700);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:buildPrompt(text)}]})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error?.message||'API error '+res.status);
    const raw=data.content[0].text;
    const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1) throw new Error('No JSON in response');
    const d=JSON.parse(raw.slice(s,e+1));
    if(!d.resonance) throw new Error('Incomplete response');
    clearInterval(loadingInterval);
    renderResponse(text,d);
  }catch(err){
    clearInterval(loadingInterval);
    document.getElementById('loading').style.display='none';
    document.getElementById('input-section').style.display='block';
    showError('Error: '+err.message);
  }
}

async function renderResponse(entry,d){
  document.getElementById('loading').style.display='none';
  document.getElementById('echo').textContent='"'+(entry.length>180?entry.slice(0,180)+'…':entry)+'"';
  document.getElementById('resonance').textContent=d.resonance;

  if(d.concept_name?.trim()){
    document.getElementById('concept-block').style.display='block';
    document.getElementById('concept-name').textContent=d.concept_name;
    document.getElementById('concept-gloss').textContent=d.concept_gloss;
    document.getElementById('primary-block').style.borderTop='1px solid #e0d8c8';
  }else{
    document.getElementById('concept-block').style.display='none';
    document.getElementById('primary-block').style.borderTop='none';
  }

  document.getElementById('primary-tradition').textContent=d.primary_tradition;
  document.getElementById('primary-who').textContent=d.primary_who;
  document.getElementById('primary-quote').textContent=d.primary_quote;
  document.getElementById('relationship-label').textContent=RELATIONSHIP_LABELS[d.relationship_type]||d.relationship_type;
  document.getElementById('mirror-relationship').textContent=d.mirror_relationship;
  document.getElementById('mirror-tradition').textContent=d.mirror_tradition;
  document.getElementById('mirror-who').textContent=d.mirror_who;
  document.getElementById('mirror-quote').textContent=d.mirror_quote;

  if(d.expansion?.trim()){document.getElementById('expansion-block').style.display='block';document.getElementById('expansion-text').textContent=d.expansion;}
  else{document.getElementById('expansion-block').style.display='none';}

  const grid=document.getElementById('art-grid');
  grid.innerHTML='';

  function renderArtCard(card, art, why) {
    const img = document.createElement('img');
    img.style.cssText = 'width:100%;height:210px;object-fit:cover;display:block;';
    img.alt = art.title;
    img.onerror = function() {
      this.style.display = 'none';
      const ph = document.createElement('div');
      ph.className = 'art-ph';
      ph.innerHTML = `<div class="art-ph-t">${art.title}</div><div class="art-ph-s">${art.tradition}</div>`;
      card.insertBefore(ph, card.firstChild);
    };
    img.src = art.url;
    const meta = document.createElement('div');
    meta.className = 'art-meta';
    meta.innerHTML = `<div class="art-title">${art.title}</div><div class="art-artist">${art.artist} · ${art.tradition}</div><div class="art-why">${why}</div>`;
    card.appendChild(img);
    card.appendChild(meta);
  }

  function renderArtPlaceholder(card, title, tradition, why) {
    const ph = document.createElement('div');
    ph.className = 'art-ph';
    ph.innerHTML = `<div class="art-ph-t">${title}</div><div class="art-ph-s">${tradition}</div>`;
    const meta = document.createElement('div');
    meta.className = 'art-meta';
    meta.innerHTML = `<div class="art-title">${title}</div><div class="art-artist">${tradition}</div><div class="art-why">${why}</div>`;
    card.appendChild(ph);
    card.appendChild(meta);
  }

  // Wait for ART library to load before rendering images
  await ART_LOAD_PROMISE;
  console.log('Rendering art — ART keys available:', Object.keys(ART).slice(0,5).join(', '));
  console.log('AI chose:', d.artwork1_key, d.artwork2_key);

  const artKeys = Object.keys(ART);
  const card1 = document.createElement('div'); card1.className = 'art-card';
  const card2 = document.createElement('div'); card2.className = 'art-card';
  grid.appendChild(card1);
  grid.appendChild(card2);

  [
    { key: d.artwork1_key, why: d.artwork1_why, card: card1, fallbackIdx: 0 },
    { key: d.artwork2_key, why: d.artwork2_why, card: card2, fallbackIdx: 3 },
  ].forEach(({ key, why, card, fallbackIdx }) => {
    const art = ART[key] || ART[artKeys[fallbackIdx % artKeys.length]];
    if (art) {
      renderArtCard(card, art, why);
    } else {
      renderArtPlaceholder(card, key || 'Artwork', '', why);
    }
  });

  document.getElementById('poem-text').textContent=d.poem_text;
  document.getElementById('poem-attr').textContent=d.poem_attribution;
  document.getElementById('poem-src').textContent=d.poem_source;
  document.getElementById('poetry-block').classList.remove('open');
  document.getElementById('response').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function togglePoetry(){document.getElementById('poetry-block').classList.toggle('open');}

function goBack(){
  document.getElementById('response').style.display='none';
  document.getElementById('input-section').style.display='block';
  document.getElementById('journal-input').value='';
  document.getElementById('poetry-block').classList.remove('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

function showError(msg){const el=document.getElementById('error-msg');el.textContent=msg;el.style.display='block';}
function hideError(){document.getElementById('error-msg').style.display='none';}
</script>
