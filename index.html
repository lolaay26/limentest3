<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limen — Go deeper.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ── UNIFIED SUBHEADING SYSTEM ─────────────────────────────────── */
:root {
  --sub: #8a6a30;
  --sub-size: 0.68rem;
  --sub-space: 0.18em;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f9f8f6; font-family:'EB Garamond',Georgia,'Times New Roman',serif; font-size:1.05rem; color:#1c1810; min-height:100vh; }
header { padding:1.8rem 2.5rem 1.4rem; border-bottom:1px solid #e0d8c8; display:flex; align-items:baseline; gap:1.2rem; }
.logo { font-size:1.7rem; letter-spacing:0.22em; font-weight:300; }
.tagline { font-family:sans-serif; font-size:0.58rem; letter-spacing:0.28em; text-transform:uppercase; color:#b8975a; font-style:italic; }
main { max-width:700px; margin:0 auto; padding:2.5rem 1.5rem 5rem; background:#f9f8f6; }
.key-section { background:#ffffff; border:1px solid #e0d8c8; padding:1.2rem 1.5rem; margin-bottom:2rem; }
.key-label { font-family:sans-serif; font-size:0.52rem; letter-spacing:0.25em; text-transform:uppercase; color:#9a8e7e; margin-bottom:0.5rem; display:block; }
.key-row { display:flex; gap:0.6rem; }
.key-input { flex:1; font-family:monospace; font-size:0.8rem; padding:0.6rem 0.8rem; border:1px solid #e0d8c8; background:#f5f0e8; color:#1c1810; outline:none; }
.key-input:focus { border-color:#b8975a; }
.key-btn { font-family:sans-serif; font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase; background:#1c1810; color:#faf7f0; border:none; padding:0.6rem 1rem; cursor:pointer; white-space:nowrap; }
.key-status { font-family:sans-serif; font-size:0.55rem; letter-spacing:0.15em; color:#4a7a5a; margin-top:0.4rem; }
.date-line { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:#9a8e7e; margin-bottom:0.6rem; }
.prompt { font-size:1.45rem; font-style:italic; font-weight:300; color:#4a4035; margin-bottom:1.8rem; line-height:1.5; }
textarea { width:100%; min-height:180px; background:#ffffff; border:1px solid #e0d8c8; padding:1.3rem 1.6rem; font-family:'EB Garamond',Georgia,'Times New Roman',serif; font-size:1.1rem; line-height:1.9; color:#1c1810; resize:vertical; outline:none; display:block; }
textarea:focus { border-color:#b8975a; }
.btn-reflect { margin-top:1rem; font-family:sans-serif; font-size:0.63rem; letter-spacing:0.25em; text-transform:uppercase; background:#1c1810; color:#faf7f0; border:none; padding:0.9rem 2.2rem; cursor:pointer; }
.btn-reflect:hover { background:#8b3a2a; }
.error { margin-top:0.8rem; color:#8b3a2a; font-style:italic; font-size:0.9rem; padding:0.7rem 1rem; border:1px solid rgba(139,58,42,0.2); background:rgba(139,58,42,0.04); }
.examples-section { margin-top:2.5rem; padding-top:2rem; border-top:1px solid #e0d8c8; }
.section-label { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); margin-bottom:1rem; font-weight:500; }
.example-btn { display:block; width:100%; text-align:left; background:#ffffff; border:1px solid #e0d8c8; padding:0.85rem 1.2rem; cursor:pointer; font-family:'EB Garamond',Georgia,'Times New Roman',serif; font-style:italic; font-size:0.9rem; color:#4a4035; line-height:1.55; margin-bottom:0.6rem; }
.example-btn:hover { border-color:#b8975a; }
#loading { display:none; text-align:center; padding:5rem 2rem; }
.loading-text { font-style:italic; font-size:1.1rem; color:#9a8e7e; margin-bottom:1.8rem; }
.dots { color:#b8975a; letter-spacing:0.8em; font-size:1.2rem; }
#response { display:none; }
/* Opening — two lines, warm dark gold, inviting */
.resonance-line1 { font-family:'EB Garamond',Georgia,'Times New Roman',serif; font-size:1.2rem; font-style:normal; font-weight:400; line-height:1.7; color:#9a5c20; margin-bottom:0.5rem; text-align:center; }
.resonance-line2 { font-family:'EB Garamond',Georgia,'Times New Roman',serif; font-size:1.2rem; font-style:normal; font-weight:400; line-height:1.7; color:#9a5c20; margin-bottom:1.8rem; text-align:center; }
/* Concept block */
.concept-block { background:#ffffff; border:1px solid #e0d8c8; border-left:3px solid #b8975a; margin-bottom:0; padding:1rem 1.5rem; }
.concept-name { font-family:sans-serif; font-size:0.82rem; letter-spacing:0.22em; color:var(--sub); margin-bottom:0.5rem; font-weight:600; text-transform:uppercase; }
.concept-gloss { font-size:1.1rem; line-height:1.85; color:#3a3028; font-style:normal; }
.phil-block { background:#ffffff; border-left:3px solid #b8975a; padding:1.3rem 1.7rem; box-shadow:0 2px 10px rgba(28,24,16,0.07); }
.phil-block.mirror { border-left-color:#8a7a5a; border-top:1px solid #e0d8c8; }
.tradition { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); margin-bottom:0.6rem; font-weight:500; }
.tradition.mt { color:var(--sub); }
.phil-text { font-size:1.05rem; line-height:1.85; color:#4a4035; margin-bottom:1rem; }
.phil-quote { font-size:1.12rem; font-style:italic; color:#1c1810; border-left:2px solid #e0d8c8; padding-left:1rem; line-height:1.75; }
.bridge { background:#fafaf8; border-left:3px solid #c8b888; border-right:1px solid #e0d8c8; padding:0.9rem 1.7rem; }
.bridge-label { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); margin-bottom:0.5rem; font-weight:500; }
.bridge-text { font-size:1.1rem; line-height:1.9; color:#5a4e3e; font-style:normal; }
.expansion { padding:1.2rem 1.4rem; margin-bottom:2rem; border-top:1px solid #e0d8c8; border-bottom:1px solid #e0d8c8; }
.expansion-label { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); margin-bottom:0.6rem; font-weight:500; }
.expansion-text { font-size:1.1rem; font-style:normal; color:#5a4e3e; line-height:1.95; }
.divider { display:flex; align-items:center; gap:1rem; margin:1.6rem 0; }
.divider-line { flex:1; height:1px; background:#e0d8c8; }
.divider-star { color:#9a5c20 !important; }
.art-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-bottom:2.4rem; }
.art-card { background:#faf7f0; border:1px solid #e0d8c8; box-shadow:0 3px 14px rgba(28,24,16,0.09); overflow:hidden; }
.art-card img { width:100%; height:300px; object-fit:contain; display:block; background:#f8f5f0; }
.art-ph { height:300px; background:linear-gradient(135deg,#ede7d9,#d5ccba); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.2rem; text-align:center; }
.art-ph-t { font-style:italic; font-size:0.95rem; color:#4a4035; margin-bottom:0.4rem; line-height:1.4; }
.art-ph-s { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); }
.art-meta { padding:1rem 1.2rem; border-top:1px solid #e0d8c8; }
.art-title { font-style:italic; font-size:1rem; color:#1c1810; margin-bottom:0.3rem; }
.art-artist { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); margin-bottom:0.5rem; font-weight:500; }
.art-why { font-size:1.05rem; color:#4a4035; line-height:1.85; }
.poetry-section { margin-bottom:2.5rem; text-align:center; }
.poetry-toggle { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); background:none; border:none; border-bottom:1px solid #c8b888; cursor:pointer; padding:0.4rem 0; font-weight:500; }
.poetry-toggle:hover { color:#b8975a; border-color:#b8975a; }
.poetry-block { display:none; margin-top:1.8rem; padding:2.5rem; background:#1c1810; color:#f5f0e8; position:relative; text-align:left; }
.poetry-block.open { display:block; }
.poem-text { font-size:1.18rem; font-style:italic; line-height:2.2; color:#f5f0e8; margin-bottom:1.3rem; white-space:pre-line; }
.poem-attr { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:#c8a860; margin-bottom:0.3rem; font-weight:500; }
.poem-src { font-style:italic; font-size:0.92rem; color:rgba(245,240,232,0.6); }
.poetry-close { position:absolute; top:1rem; right:1.2rem; font-family:sans-serif; font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(245,240,232,0.4); background:none; border:none; cursor:pointer; }
.poetry-close:hover { color:#b8975a; }
.btn-back { font-family:sans-serif; font-size:var(--sub-size); letter-spacing:var(--sub-space); text-transform:uppercase; color:var(--sub); background:none; border:none; border-bottom:1px solid #c8b888; cursor:pointer; padding:0.3rem 0; display:inline-block; font-weight:500; }
.btn-back:hover { color:#b8975a; border-color:#b8975a; }
@media(max-width:600px){
  header { padding:1.2rem 1.2rem 1rem; }
  main { padding:1.8rem 1.1rem 4rem; }
  .art-grid { grid-template-columns:1fr; }
  .art-card img { height:260px; }
  .art-ph { height:300px; }
  .poetry-block { padding:1.8rem 1.2rem; }
  .phil-block { padding:1.1rem 1.2rem; }
  .bridge { padding:0.8rem 1.2rem; }
  .expansion { padding:1rem 1.2rem; }
  textarea { font-size:1rem; padding:1rem 1.2rem; }
  .prompt { font-size:1.25rem; }
  .resonance-line1, .resonance-line2 { font-size:1rem; }
  .btn-reflect { width:100%; text-align:center; padding:1rem; }
}

/* Entry preview — small whisper at top of response */
.entry-preview { margin-bottom:1.5rem; }
.entry-preview-text { font-size:0.88rem; font-style:italic; color:#9a8e7e; line-height:1.7; }
.entry-preview-more { background:none; border:none; font-family:sans-serif; font-size:0.58rem; letter-spacing:0.15em; color:#b8975a; cursor:pointer; padding:0; margin-left:0.3rem; }
</style>
</head>

<header>
  <div class="logo">LIMEN</div>
  <div class="tagline">Go deeper.</div>
</header>
<main>
  <!-- API key configured in script below -->


  <div id="input-section">
    <div class="date-line" id="date-line"></div>
    <div class="prompt">Write anything.</div>
    <textarea id="journal-input" placeholder="A journal entry, a thought, a feeling you can't name, a conversation that stayed with you, something you noticed — anything at all..."></textarea>
    <div class="error" id="error-msg" style="display:none"></div>
    <button class="btn-reflect" onclick="reflect()">Reflect →</button>
    <div class="examples-section">
      <div class="section-label">Or try one of these</div>
      <div id="examples-list"></div>
    </div>
  </div>

  <div id="loading">
    <div class="loading-text" id="loading-text">Going deeper into what you've shared…</div>
    <div class="dots">✦ ✦ ✦</div>
  </div>

  <div id="response">
    <div class="resonance-line1" id="resonance-line1"></div>
    <div class="resonance-line2" id="resonance-line2"></div>
    <div id="concept-block" class="concept-block" style="display:none">
      <div class="concept-name" id="concept-name"></div>
      <div class="concept-gloss" id="concept-gloss"></div>
    </div>
    <div class="phil-block" id="primary-block">
      <div class="tradition" id="primary-tradition"></div>
      <div class="phil-text" id="primary-who"></div>
      <div class="phil-quote" id="primary-quote"></div>
    </div>
    <div class="bridge">
      <div class="bridge-label" id="relationship-label"></div>
      <div class="bridge-text" id="mirror-relationship"></div>
    </div>
    <div class="phil-block mirror">
      <div class="tradition mt" id="mirror-tradition"></div>
      <div class="phil-text" id="mirror-who"></div>
      <div class="phil-quote" id="mirror-quote"></div>
    </div>
    <div class="expansion" id="expansion-block" style="display:none">
      <div class="expansion-label">And further —</div>
      <div class="expansion-text" id="expansion-text"></div>
    </div>
    <div class="divider"><div class="divider-line"></div><div class="divider-star" style="color:#9a5c20 !important">✦</div><div class="divider-line"></div></div>
    <div class="section-label">Two works that resonate</div>
    <div class="art-grid" id="art-grid"></div>
    <div class="entry-preview" id="entry-preview" style="margin-bottom:1.5rem;padding-top:1rem;border-top:1px solid #e0d8c8;">
      <span class="entry-preview-text" id="entry-preview-text"></span><button class="entry-preview-more" id="entry-preview-toggle" onclick="toggleEntry()"></button>
    </div>
    <div class="poetry-section">
      <button class="poetry-toggle" onclick="togglePoetry()">✦ &nbsp; A poem that found its way here &nbsp; ✦</button>
      <div class="poetry-block" id="poetry-block">
        <button class="poetry-close" onclick="togglePoetry()">close ✕</button>
        <div class="poem-text" id="poem-text"></div>
        <div class="poem-attr" id="poem-attr"></div>
        <div class="poem-src" id="poem-src"></div>
      </div>
    </div>
    <button class="btn-back" onclick="goBack()">← Begin a new entry</button>
  </div>
</main>

];

const ART = {};
const ART_LOAD_PROMISE = (async () => {
  // Get AIC metadata (titles, artists, traditions) — this works fine
  const batch1 = AIC_WORKS.slice(0, 50).map(w => w.id).join(',');
  const batch2 = AIC_WORKS.slice(50).map(w => w.id).join(',');
  const aicMeta = {};
  for (const ids of [batch1, batch2]) {
    if (!ids) continue;
    try {
      const res = await fetch(`https://api.artic.edu/api/v1/artworks?ids=${ids}&fields=id,title,artist_display&limit=50`);
      const data = await res.json();
      (data.data || []).forEach(item => { aicMeta[item.id] = item; });
    } catch(e) {}
  }

  // For each work, find image via Met Museum API (allows Cloudflare requests)
  async function getMetImage(searchQuery) {
    try {
      const searchRes = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&isPublicDomain=true&q=${encodeURIComponent(searchQuery)}`);
      const searchData = await searchRes.json();
      if (!searchData.objectIDs?.length) return null;
      // Try more results to find a painting/artwork not a portrait photo
      const excludeTypes = ['photograph', 'gelatin silver print', 'albumen print', 'daguerreotype', 'chromogenic print'];
      for (let i = 0; i < Math.min(8, searchData.objectIDs.length); i++) {
        const objRes = await fetch(`https://collectionapi.metmuseum.org/public/collection/v1/objects/${searchData.objectIDs[i]}`);
        const obj = await objRes.json();
        if (!obj.primaryImageSmall || !obj.isPublicDomain) continue;
        const medium = (obj.medium || '').toLowerCase();
        const objType = (obj.objectName || '').toLowerCase();
        const isPhoto = excludeTypes.some(t => medium.includes(t) || objType.includes(t));
        if (!isPhoto) return `${PROXY}${encodeURIComponent(obj.primaryImageSmall)}`;
      }
      return null;
    } catch(e) { return null; }
  }

  // Also try Wikimedia as fallback
  async function getWikiImage(searchQuery) {
    try {
      const searchRes = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchQuery)}&srnamespace=6&srlimit=5&format=json&origin=*`);
      const searchData = await searchRes.json();
      const results = searchData?.query?.search;
      if (!results?.length) return null;
      for (const result of results.slice(0, 3)) {
        const infoRes = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(result.title)}&prop=imageinfo&iiprop=url|thumburl&iiurlwidth=600&format=json&origin=*`);
        const infoData = await infoRes.json();
        const page = Object.values(infoData?.query?.pages || {})[0];
        const imgUrl = page?.imageinfo?.[0]?.thumburl;
        if (imgUrl) return `${PROXY}${encodeURIComponent(imgUrl)}`;
      }
      return null;
    } catch(e) { return null; }
  }

  // Load images in parallel for all works
  await Promise.all(AIC_WORKS.map(async w => {
    const searchQuery = `${w.artist.split(',')[0]} ${w.title.split('(')[0].trim()}`;
    // Try Met first, then Wikimedia
    let imgUrl = await getMetImage(searchQuery) || await getWikiImage(searchQuery);
    ART[w.key] = {
      url: imgUrl || null,
      title: w.title,
      artist: w.artist,
      tradition: w.tradition
    };
  }));

  const loaded = Object.values(ART).filter(a => a.url).length;
  console.log(`ART library loaded: ${loaded} of ${AIC_WORKS.length} works with images`);
})();

const ART_KEYS = AIC_WORKS.map(w => `${w.key} (${w.title} · ${w.tradition})`).join(', ');

const RELATIONSHIP_LABELS = {

let loadingInterval;



function buildPrompt(entry){
  return `You are the philosophical heart of Limen, a journaling app. Your role is not to analyze or interpret. It is to meet.

Journal entry: "${entry}"

YOUR CORE TASK:
Read this entry for the full quality of experience it carries — not just its surface statement but the layers operating simultaneously: sensory, temporal, affective, relational. Think of Daniel Stern's concept of the "present moment" — the way a lived experience carries multiple registers at once: vitality contours, feeling tones, temporal shapes. The entry may not know what it is yet. Find where in the full breadth of human thought — any tradition, any culture, any century — those same layers have been named, lived, or understood. The match is a recognition: the reader arrives at a thinker or concept and feels that something already present in their experience has now been seen. The tradition does not interpret the entry. It meets it.

CRITICAL — CONCEPT AND THINKER MUST MATCH:
If you open with a concept, the primary thinker MUST be the philosopher who developed or most deeply inhabited that concept. Haecceity → Deleuze/Guattari. Conatus → Spinoza. Fūdo → Watsuji. Duration → Bergson. Heteroglossia → Bakhtin. Dadirri → Ungunmerr-Baumann. Emplacement → Howes. Dwelling → Ingold. The concept and the thinker are one move, not two separate ones.

TONE: Warm, direct, learned. Not therapeutic, not academic. Short sentences. The ideas can be sophisticated — the language should feel spoken, not written. A curious 17-year-old should follow it without losing the depth. Never use: "invites us to", "reminds us", "journey", "growth", "healing", "transform", "explore", "navigate", "sit with", "hold space", "unpack", "argued", "arguing", "contended", "claimed", "spent decades", "spent their life", "devoted their career". Use instead: showed, saw, held, insisted, refused, knew, understood, found, wrote, believed.

OPENING — always two moves, two separate sentences:
MOVE 1: One simple direct observation of what the entry is carrying. Sensory or temporal. Not a constructed metaphor. Not inside the person's head. Just what is — stated plainly. Example: "The beginning alive. The middle gone quiet before it finished." Or: "The body insisting. Not a want — more like a weather that has moved in." Short. Simple. Direct.
MOVE 2 (concept-led): "[Thinker] called this [concept]." e.g. "Bergson called this duration." "Spinoza called this conatus." "Howes called this emplacement."
MOVE 2 (thinker-led): "There is a philosopher whose work rhymes with this. [Name]." Name the discipline when relevant. The name lands as a short final beat on its own.

PHILOSOPHER DESCRIPTIONS — 2 sentences maximum, tight:
Sentence 1: [Name] was a [tradition word], [one specific fact]. NEVER mention nationality — the tradition label already carries that. No warm-up phrases. No "spent their life thinking about." No "devoted their career to." Just the fact.
Sentence 2: What this entry shares with their work. One concrete clause.
Examples:
"Bergson was a vitalist who insisted clock time is a fiction — a grid thrown over something alive."
"Zhuangzi was a Daoist philosopher in fourth-century BCE China who refused to separate skillful action from attentiveness to natural grain."
"Spinoza was a lens grinder, a rationalist, expelled from Amsterdam for refusing to separate God from nature."
"Goffman was a sociologist, trained at Chicago, who showed that social life is structured by performance."

CRITICAL — CONCEPT NAME CONSISTENCY:
The term named in Move 2 of the opening ("Goffman called this X") MUST be the exact same term used in concept_name. Never use one name in the opening and a different name in the concept block. If the opening says "performance of self" the concept_name must say "PERFORMANCE OF SELF" — not "presentation of self" or any variation.

CONCEPT GLOSS — one compressed clause, under 20 words. Like a precise dictionary entry. No interpretation beyond the definition.
Examples:
"Opacity — Glissant's word for the right to remain unknowable, not fully transparent to others."
"Duration — Bergson's term for lived time as continuous qualitative flow, not measurable instants."
"Conatus — Spinoza's word for the drive in every living thing to persist and go on being."

FULL RANGE OF THINKERS — the entry decides who leads, not habit or frequency:
Continental: Spinoza, Bergson, Heidegger, Nietzsche, Merleau-Ponty, Bachelard, de Beauvoir, Wittgenstein, Benjamin, Bakhtin, Deleuze/Guattari, Husserl, Sartre, Arendt, Levinas
American: James, Thoreau, Dewey
Affect/Embodiment (in order of preference): Massumi, Kathleen Stewart, Ahmed, Braidotti, Teresa Brennan, Grosz, Barad, Deleuze/Guattari — and only if nothing else fits: Berlant
Spinoza specialists: Genevieve Lloyd (The Man of Reason, Spinoza's ethics, reason and gender)
Ecology/More-than-human: Abram, Toadvine, Haraway, Tsing, Viveiros de Castro
Anthropology of senses/place: Tim Ingold (dwelling, wayfaring, skill, animate earth), David Howes (emplacement, sensory anthropology), Paul Stoller (sensory ethnography)
Black feminist/Diasporic: Lorde, Wynter, hooks, Moten, Mbembe, Glissant, Fanon, Gilroy
East Asian: Nishida, Watsuji, Yuasa, Zhuangzi, Nagarjuna, Dōgen, Ibn Rushd, Confucius
Indigenous: Kimmerer, Atleo, Deloria, Ungunmerr-Baumann, Coulthard, Simpson, TallBear, Ubuntu, Buen Vivir
Contemplative: Thich Nhat Hanh, Machig Labdrön, Mirabai

Do not default to the same thinkers. Do not reach for Berlant unless no other thinker fits more precisely.

CONCEPTS (concept and primary thinker must match):
haecceity → Deleuze/Guattari | conatus → Spinoza | heteroglossia → Bakhtin | duration → Bergson | affect → Massumi | opacity → Glissant | fūdo → Watsuji | interbeing → Thich Nhat Hanh | sympoiesis → Haraway | dadirri → Ungunmerr-Baumann | cruel optimism → Berlant | grievability → Butler | emplacement → Howes | dwelling → Ingold | flesh/chair → Merleau-Ponty | mono no aware → Japanese aesthetics | ubuntu → African philosophy | becoming → Deleuze/Guattari | the fold → Deleuze

SECOND THINKER — different tradition, not opposition:
- convergence: arriving at the same territory from different directions
- deepening: one takes the other further than it could reach alone
- expansion: adds a dimension the first tradition entirely missed
- feminist resonance: names what the first saw but couldn't say

AND FURTHER — 2 sentences maximum. Both thinkers named. Plain spoken language — one sentence sensory or image-based, one sentence the philosophical turn. Stays at the level of the idea. Does not comment on or affirm the person's specific situation. Does not tell them what their experience means. Opens a door, does not walk through it on their behalf. Never: "Maybe that's just..." or "Perhaps you are..." Example register: "Bergson heard the felt quality of experience — its intensity, its vitality — peaks, then thins. Zhuangzi would add: the question was never whether you finished, but whether you were following the grain at all."

ARTWORKS — choose two from this curated library. Different traditions. Match the quality of experience, not just the subject.
${ART_KEYS}

JSON only, no markdown:
{
  "resonance": "Two sentences. Sentence 1: sharp sensory observation of what the entry carries. Sentence 2: '[Thinker] called this [concept].' OR 'There is a [philosopher/anthropologist/poet] whose work rhymes with this. [Name].' Together under 40 words.",
  "concept_name": "Concept term if concept-led — MUST match primary thinker. Else empty string.",
  "concept_gloss": "One compressed clause under 20 words. Precise dictionary style. Format: '[Concept] — [thinker]'s word/term for [definition].' No interpretation beyond the definition.",
  "primary_tradition": "Thinker · Tradition",
  "primary_who": "Exactly 2 sentences. Structure: '[Name] was a [tradition word], [specific biographical fact].' Then: what specific territory they share with THIS entry.",
  "primary_quote": "Real verified quote, under 35 words",
  "relationship_type": "convergence/deepening/expansion/feminist resonance",
  "mirror_tradition": "Thinker · Tradition",
  "mirror_who": "Exactly 2 sentences. Same structure as primary_who.",
  "mirror_quote": "Real verified quote, under 30 words",
  "mirror_relationship": "One sentence. Name BOTH thinkers by name — never 'they' or 'both' or 'together'. What becomes visible holding them together.",
  "expansion": "EXACTLY 2 sentences. No more. Name BOTH thinkers by name. Spoken language. Level of the idea only. Does not address the person. If you write a third sentence, delete it.",
  "artwork1_key": "key from library",
  "artwork1_why": "One sentence — the quality of experience this work shares with the entry",
  "artwork2_key": "Different key, different tradition",
  "artwork2_why": "One sentence — the quality of experience this work shares with the entry",
  "poem_text": "3-5 lines — real poem, genuine resonance",
  "poem_attribution": "Poet · tradition",
  "poem_source": "Title and date"
}`;
}

async function reflect(){
  const text=document.getElementById('journal-input').value.trim();
  if(text.length<20){showError('Write a little more before reflecting.');return;}
  hideError();
  document.getElementById('input-section').style.display='none';
  document.getElementById('response').style.display='none';
  document.getElementById('loading').style.display='block';
  let tick=0;
  loadingInterval=setInterval(()=>{tick++;document.getElementById('loading-text').textContent=LOADING_TEXTS[tick%LOADING_TEXTS.length]+'…';},2000);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:buildPrompt(text)}]})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error?.message||'API error '+res.status);
    const raw=data.content[0].text;
    const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1) throw new Error('No JSON in response');
    const d=JSON.parse(raw.slice(s,e+1));
    if(!d.resonance) throw new Error('Incomplete response');
    clearInterval(loadingInterval);
    renderResponse(text,d);
  }catch(err){
    clearInterval(loadingInterval);
    document.getElementById('loading').style.display='none';
    document.getElementById('input-section').style.display='block';
    showError('Error: '+err.message);
  }
}

async function renderResponse(entry,d){
  document.getElementById('loading').style.display='none';
  // Entry preview
  const shortEntry = entry.length > 120 ? entry.slice(0, 120) + '…' : entry;
  const previewEl = document.getElementById('entry-preview-text');
  previewEl.textContent = shortEntry;
  previewEl.setAttribute('data-short', shortEntry);
  previewEl.setAttribute('data-full', entry);
  const toggleBtn = document.getElementById('entry-preview-toggle');
  if (entry.length > 120) { toggleBtn.textContent = ' ↓ more'; } else { toggleBtn.textContent = ''; }
  // Split resonance into two lines — first sentence, then the rhyme/word line
  const res = d.resonance || '';
  const splitIdx = res.search(/\.\s+There is|There is/);
  if (splitIdx > 0) {
    document.getElementById('resonance-line1').textContent = res.slice(0, splitIdx).trim().replace(/\.$/, '') + '.';
    document.getElementById('resonance-line2').textContent = res.slice(splitIdx).trim();
  } else {
    const dotIdx = res.indexOf('. ');
    if (dotIdx > 0) {
      document.getElementById('resonance-line1').textContent = res.slice(0, dotIdx + 1).trim();
      document.getElementById('resonance-line2').textContent = res.slice(dotIdx + 2).trim();
    } else {
      document.getElementById('resonance-line1').textContent = res;
      document.getElementById('resonance-line2').textContent = '';
    }
  }

  if(d.concept_name?.trim()){
    document.getElementById('concept-block').style.display='block';
    document.getElementById('concept-name').textContent=d.concept_name;
    document.getElementById('concept-gloss').textContent=d.concept_gloss;
    document.getElementById('primary-block').style.borderTop='1px solid #e0d8c8';
  }else{
    document.getElementById('concept-block').style.display='none';
    document.getElementById('primary-block').style.borderTop='none';
  }

  document.getElementById('primary-tradition').textContent=d.primary_tradition;
  document.getElementById('primary-who').textContent=d.primary_who;
  document.getElementById('primary-quote').textContent=d.primary_quote;
  document.getElementById('relationship-label').textContent=RELATIONSHIP_LABELS[d.relationship_type]||d.relationship_type;
  document.getElementById('mirror-relationship').textContent=d.mirror_relationship;
  document.getElementById('mirror-tradition').textContent=d.mirror_tradition;
  document.getElementById('mirror-who').textContent=d.mirror_who;
  document.getElementById('mirror-quote').textContent=d.mirror_quote;

  if(d.expansion?.trim()){document.getElementById('expansion-block').style.display='block';document.getElementById('expansion-text').textContent=d.expansion;}
  else{document.getElementById('expansion-block').style.display='none';}

  const grid=document.getElementById('art-grid');
  grid.innerHTML='';

  function renderArtCard(card, art, why) {
    const img = document.createElement('img');
    img.style.cssText = '';
    img.alt = art.title;
    img.onerror = function() {
      this.style.display = 'none';
      const ph = document.createElement('div');
      ph.className = 'art-ph';
      ph.innerHTML = `<div class="art-ph-t">${art.title}</div><div class="art-ph-s">${art.tradition}</div>`;
      card.insertBefore(ph, card.firstChild);
    };
    img.src = art.url;
    const meta = document.createElement('div');
    meta.className = 'art-meta';
    meta.innerHTML = `<div class="art-title">${art.title}</div><div class="art-artist">${art.artist} · ${art.tradition}</div><div class="art-why">${why}</div>`;
    card.appendChild(img);
    card.appendChild(meta);
  }

  function renderArtPlaceholder(card, title, tradition, why) {
    const ph = document.createElement('div');
    ph.className = 'art-ph';
    ph.innerHTML = `<div class="art-ph-t">${title}</div><div class="art-ph-s">${tradition}</div>`;
    const meta = document.createElement('div');
    meta.className = 'art-meta';
    meta.innerHTML = `<div class="art-title">${title}</div><div class="art-artist">${tradition}</div><div class="art-why">${why}</div>`;
    card.appendChild(ph);
    card.appendChild(meta);
  }

  // Wait for ART library to load before rendering images
  await ART_LOAD_PROMISE;
  console.log('Rendering art — ART keys available:', Object.keys(ART).slice(0,5).join(', '));
  console.log('AI chose:', d.artwork1_key, d.artwork2_key);

  const artKeys = Object.keys(ART);
  const card1 = document.createElement('div'); card1.className = 'art-card';
  const card2 = document.createElement('div'); card2.className = 'art-card';
  grid.appendChild(card1);
  grid.appendChild(card2);

  [
    { key: d.artwork1_key, why: d.artwork1_why, card: card1, fallbackIdx: 0 },
    { key: d.artwork2_key, why: d.artwork2_why, card: card2, fallbackIdx: 3 },
  ].forEach(({ key, why, card, fallbackIdx }) => {
    const art = ART[key] || ART[artKeys[fallbackIdx % artKeys.length]];
    if (art) {
      renderArtCard(card, art, why);
    } else {
      renderArtPlaceholder(card, key || 'Artwork', '', why);
    }
  });

  document.getElementById('poem-text').textContent=d.poem_text;
  document.getElementById('poem-attr').textContent=d.poem_attribution;
  document.getElementById('poem-src').textContent=d.poem_source;
  document.getElementById('poetry-block').classList.remove('open');
  document.getElementById('response').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleEntry(){
  const el = document.getElementById('entry-preview-text');
  const btn = document.getElementById('entry-preview-toggle');
  const full = el.getAttribute('data-full');
  const short = el.getAttribute('data-short');
  if (el.textContent === short) {
    el.textContent = full;
    btn.textContent = ' ↑';
  } else {
    el.textContent = short;
    btn.textContent = ' ↓ more';
  }
}

document.addEventListener('DOMContentLoaded', function() {
